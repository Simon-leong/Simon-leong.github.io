{% if site.author.wechat %}
<div id="wechat-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:99999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:32px 28px 20px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.25);max-width:360px;width:90%;">
    <p style="margin:0 0 16px;font-weight:600;color:#202124;font-size:17px;">扫码添加微信</p>
    <img src="/images/new/wechat.jpg" alt="WeChat QR Code" style="width:280px;height:280px;object-fit:contain;border-radius:10px;">
    <p style="margin:16px 0 0;font-size:13px;color:#aaa;">点击外部区域关闭</p>
  </div>
</div>
<script>
  (function () {
    var modal = document.getElementById('wechat-modal');
    modal.addEventListener('click', function (e) {
      if (e.target === modal) modal.style.display = 'none';
    });
    window._openWechatModal = function () { modal.style.display = 'flex'; };
  })();
</script>
{% endif %}
